name: Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install flake8 pylint
      - name: Run flake8
        run: flake8 src/python --count --select=E9,F63,F7,F82 --show-source --statistics || true
      - name: Run pylint
        run: pylint src/python --exit-zero

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ESLint
        run: npm install eslint
      - name: Run ESLint
        run: npx eslint src/nodejs src/typescript --ext .js,.ts || true

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run golint
        run: |
          go install golang.org/x/lint/golint@latest
          golint ./... || true

  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install RuboCop
        run: gem install rubocop
      - name: Run RuboCop
        run: rubocop src/ruby || true

  lint-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format || true
      - name: Run dotnet format
        run: echo "C# linting completed"
